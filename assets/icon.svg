<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="ai_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shape: Centered 96x96 inside 128x128 (16px padding) -->
  <!-- Note: We use a square background as CWS will apply its own rounding, 
       but for better standalone looks we add a small radius here too -->
  <rect x="16" y="16" width="96" height="96" rx="20" fill="url(#ai_gradient)" />

  <!-- Main Sparkle -->
  <path d="M64 36
           Q66.5 54 84 56.5
           Q66.5 59 64 77
           Q61.5 59 44 56.5
           Q61.5 54 64 36 Z" 
        fill="white" filter="url(#glow)" />

  <!-- Smaller Top-Right Sparkle -->
  <path d="M88 32
           Q89 39 96 40
           Q89 41 88 48
           Q87 41 80 40
           Q87 39 88 32 Z" 
        fill="white" opacity="0.8" />

  <!-- Bottom-Left Dot -->
  <circle cx="42" cy="84" r="4" fill="white" opacity="0.6" />
</svg>
